name: Bug Report
description: Report a bug in Litmux
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill in the details below.
  - type: input
    id: command
    attributes:
      label: Command
      description: Which command were you running?
      placeholder: "litmux run, litmux generate, litmux eval, etc."
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. Include the full error message if possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1. 
        2. 
        3. 
  - type: input
    id: version
    attributes:
      label: Litmux version
      placeholder: "0.1.0 (run `litmux version`)"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12 (run `python --version`)"
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
