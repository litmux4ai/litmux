name: Feature Request
description: Suggest a new feature for Litmux
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: We'd love to hear your ideas! Describe the feature you'd like.
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem would this solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI (litmux run/eval/generate/cost)
        - Providers (OpenAI/Anthropic/Google/HuggingFace)
        - Dataset generation
        - Assertions & evaluation
        - CI/CD integration
        - Other
